For each one:
1. Click **"Add file"** → **"Create new file"**
2. In the name box type the full path including folders:
```
netlify/functions/send-consumer-email.js
```

GitHub creates the folders automatically when you include the `/` in the filename.

3. Open the corresponding `.js` file I gave you → copy all the contents → paste into GitHub editor
4. Click **"Commit changes"**

